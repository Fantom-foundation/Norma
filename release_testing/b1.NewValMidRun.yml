# Scenario B1: a new validator joins the network. The new validator should be able to sync up to the head.
# - Set up: start 4 sonic validators, 2 RPC nodes and 2 observers.
# - Test: process transactions for 6 minutes, then create a genesis. Add a new validator syncing using the genesis.
# - Validation: check list of validator and validate final state of nodes

name: B1.NewValMidRun
duration: 420 # 6 minutes sim + 2m50s to add new validator

# backward compatibility, to be removed.
nodes:
  - name: genesis-validator
    instances: 4
    client:
      imagename: main
      type: validator

  - name: RPC
    instances: 2
    client: 
      imagename: main
      type: RPC
    
  - name: observer
    instances: 2
    client:
      imagename: main
      type: observer

  - name: new-validator
    start: 170
    client:
      imagename: main
      type: validator

# In the network there is a single application producing constant load.
applications:
  - name: load
    type: counter
    start: 1            # start time
    end: 419            # termination time
    users: 20           # number of users / accounts generating txs
    rate:
      constant: 100     # Tx/s
